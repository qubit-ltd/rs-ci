name: Reusable Rust CI

on:
  workflow_call:
    inputs:
      rust_toolchain:
        description: Rust toolchain used for Linux fmt, clippy, build, test, docs, and audit jobs.
        required: false
        type: string
        default: nightly
      run_coverage_cfg_clippy:
        description: Set to 1 to run clippy again with RUSTFLAGS=--cfg coverage.
        required: false
        type: string
        default: "0"
      cargo_llvm_cov_version:
        description: cargo-llvm-cov version installed for coverage jobs.
        required: false
        type: string
        default: "0.6.21"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: ${{ inputs.rust_toolchain }}
  RUN_COVERAGE_CFG_CLIPPY: ${{ inputs.run_coverage_cfg_clippy }}
  CARGO_LLVM_COV_VERSION: ${{ inputs.cargo_llvm_cov_version }}

jobs:
  fast_checks:
    name: Fast checks
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Restore cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-
            ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-

      - name: Install rustfmt and clippy
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup component add rustfmt clippy --toolchain "$RUST_TOOLCHAIN"
          rustup default "$RUST_TOOLCHAIN"

      - name: Check code format
        run: |
          if [ -f .rs-ci/rustfmt.toml ]; then
            RUSTFMT_CONFIG=.rs-ci/rustfmt.toml
          else
            RUSTFMT_CONFIG=rustfmt.toml
          fi
          cargo fmt -- --check --config-path "$RUSTFMT_CONFIG"

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run clippy for coverage cfg when enabled
        run: |
          if [ "$RUN_COVERAGE_CFG_CLIPPY" = "1" ]; then
            RUSTFLAGS="--cfg coverage" cargo clippy --all-targets --all-features -- -D warnings
          else
            echo "RUN_COVERAGE_CFG_CLIPPY is not enabled"
          fi

  build_test_coverage:
    name: Build, test, and coverage
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    needs:
      - fast_checks

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Restore cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-
            ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-

      - name: Restore cargo-binstall cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-binstall
          key: ${{ runner.os }}-cargo-binstall-v1.10.15
          restore-keys: |
            ${{ runner.os }}-cargo-binstall-

      - name: Restore cargo-llvm-cov cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/cargo-llvm-cov
            ~/.cargo/bin/llvm-cov
            ~/.cargo/bin/llvm-profdata
          key: ${{ runner.os }}-cargo-binaries-llvm-cov-${{ env.CARGO_LLVM_COV_VERSION }}
          restore-keys: |
            ${{ runner.os }}-cargo-binaries-llvm-cov-

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup component add llvm-tools-preview --toolchain "$RUST_TOOLCHAIN"
          rustup default "$RUST_TOOLCHAIN"

      - name: Install cargo-binstall
        run: |
          if ! command -v cargo-binstall > /dev/null 2>&1; then
            curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          fi

      - name: Install cargo-llvm-cov and jq
        run: |
          if ! command -v cargo-llvm-cov > /dev/null 2>&1; then
            cargo binstall cargo-llvm-cov --version "$CARGO_LLVM_COV_VERSION" --no-confirm --log-level info
          fi
          if ! command -v jq > /dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Build project (debug)
        run: cargo build --verbose

      - name: Run doc tests
        run: cargo test --doc --verbose

      - name: Run tests and generate coverage reports
        run: |
          COVERAGE_ENFORCE_THRESHOLDS=0 COVERAGE_OPEN_HTML=0 ./coverage.sh all
          cp target/llvm-cov/coverage.json coverage.json
          cp target/llvm-cov/lcov.info coverage.lcov
          cp target/llvm-cov/coverage.txt coverage.txt

      - name: Display coverage summary
        run: |
          echo "================================"
          echo "Code Coverage Summary"
          echo "================================"
          cat coverage.txt

      - name: Upload coverage to Coveralls
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
        run: |
          if [ -n "$COVERALLS_REPO_TOKEN" ]; then
            if [ ! -s coverage.lcov ]; then
              echo "coverage.lcov is empty; skipping Coveralls upload"
              exit 0
            fi
            curl -sL https://coveralls.io/coveralls-linux.tar.gz | tar -xz
            ./coveralls report coverage.lcov --repo-token="$COVERALLS_REPO_TOKEN"
          else
            echo "COVERALLS_REPO_TOKEN is not set; skipping upload"
          fi

      - name: Build project (release)
        run: cargo build --release --verbose

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            coverage.lcov
            coverage.txt
            coverage.json
            target/llvm-cov

  doc:
    name: Documentation
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    needs:
      - build_test_coverage

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Restore cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-
            ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"

      - name: Generate documentation
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --verbose

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v7
        with:
          name: rustdoc
          path: target/doc

  security_audit:
    name: Security audit
    if: ${{ always() && (github.event_name == 'schedule' || needs.build_test_coverage.result == 'success') && (github.event_name != 'schedule' || github.ref_name == 'main' || github.ref_name == 'master') }}
    runs-on: ubuntu-latest
    needs:
      - build_test_coverage

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Restore cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-
            ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-

      - name: Restore cargo-binstall cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-binstall
          key: ${{ runner.os }}-cargo-binstall-v1.10.15
          restore-keys: |
            ${{ runner.os }}-cargo-binstall-

      - name: Restore cargo-audit cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-binaries-audit-latest
          restore-keys: |
            ${{ runner.os }}-cargo-binaries-audit-

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"

      - name: Install cargo-binstall
        run: |
          if ! command -v cargo-binstall > /dev/null 2>&1; then
            curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          fi

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit > /dev/null 2>&1; then
            cargo binstall cargo-audit --no-confirm --log-level info
          fi

      - name: Run security audit
        run: cargo audit

  windows_test:
    name: Windows test
    if: ${{ github.event_name != 'schedule' }}
    runs-on: windows-2022
    needs:
      - build_test_coverage

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Restore cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target
          key: ${{ runner.os }}-cargo-stable-${{ hashFiles('Cargo.toml') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable-${{ hashFiles('Cargo.toml') }}-
            ${{ runner.os }}-cargo-stable-

      - name: Install Rust
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $cargoBin = Join-Path $env:USERPROFILE ".cargo\bin"
          $env:Path = "$cargoBin;$env:Path"
          if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
            Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile "rustup-init.exe"
            .\rustup-init.exe -y --default-toolchain stable --profile minimal
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          rustup default stable
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          rustup component add clippy
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          rustc --version
          cargo --version

      - name: Build and test on Windows
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
          cargo test --verbose
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run clippy on Windows
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
          cargo clippy --all-targets --all-features -- -D warnings
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
