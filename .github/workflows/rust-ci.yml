name: Reusable Rust CI

on:
  workflow_call:
    inputs:
      rust_build_toolchain:
        description: Rust toolchain used for Linux build, test, docs, coverage, package, and audit jobs.
        required: false
        type: string
        default: "1.94.0"
      rust_fmt_toolchain:
        description: Dated nightly Rust toolchain used for rustfmt.
        required: false
        type: string
        default: nightly-2026-06-05
      rust_clippy_toolchain:
        description: Dated nightly Rust toolchain used for clippy.
        required: false
        type: string
        default: nightly-2026-06-05
      run_coverage_cfg_clippy:
        description: Set to 1 to run clippy again with RUSTFLAGS=--cfg coverage.
        required: false
        type: string
        default: "0"
      cargo_llvm_cov_version:
        description: cargo-llvm-cov version installed for coverage jobs.
        required: false
        type: string
        default: "0.6.21"
      coverage_enforce_thresholds:
        description: Set to 1 to enforce per-source coverage thresholds.
        required: false
        type: string
        default: "0"
      cargo_fuzz_version:
        description: cargo-fuzz version installed for conditional fuzz smoke checks.
        required: false
        type: string
        default: "0.13.2"
      cargo_fuzz_toolchain:
        description: Nightly Rust toolchain used by cargo-fuzz.
        required: false
        type: string
        default: nightly-2026-06-05
      miri_toolchain:
        description: Dated nightly Rust toolchain used by conditional Miri checks.
        required: false
        type: string
        default: nightly-2026-06-05
      sanitizer_toolchain:
        description: Dated nightly Rust toolchain used by conditional sanitizer checks.
        required: false
        type: string
        default: nightly-2026-06-05
      cargo_fuzz_mode:
        description: "Conditional fuzz check mode: smoke, build-only, or disabled."
        required: false
        type: string
        default: smoke
      cargo_fuzz_seconds_per_target:
        description: Maximum smoke fuzzing duration per target in seconds.
        required: false
        type: string
        default: "10"
      cargo_fuzz_max_len:
        description: Maximum libFuzzer input length in bytes.
        required: false
        type: string
        default: "4096"
      cargo_feature_matrix_config:
        description: Project-relative path to optional Cargo feature matrix config.
        required: false
        type: string
        default: ".rs-ci-cargo-matrix.json"
      run_windows_tests:
        description: Run clippy and tests on the pinned Windows runner.
        required: false
        type: boolean
        default: false
      run_macos_tests:
        description: Run clippy and tests on the pinned macOS runner.
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RS_CI_BUILD_TOOLCHAIN: ${{ inputs.rust_build_toolchain }}
  RS_CI_FMT_TOOLCHAIN: ${{ inputs.rust_fmt_toolchain }}
  RS_CI_CLIPPY_TOOLCHAIN: ${{ inputs.rust_clippy_toolchain }}
  RUN_COVERAGE_CFG_CLIPPY: ${{ inputs.run_coverage_cfg_clippy }}
  CARGO_LLVM_COV_VERSION: ${{ inputs.cargo_llvm_cov_version }}
  COVERAGE_ENFORCE_THRESHOLDS: ${{ inputs.coverage_enforce_thresholds }}
  CARGO_FUZZ_VERSION: ${{ inputs.cargo_fuzz_version }}
  RS_CI_FUZZ_TOOLCHAIN: ${{ inputs.cargo_fuzz_toolchain }}
  RS_CI_MIRI_TOOLCHAIN: ${{ inputs.miri_toolchain }}
  RS_CI_SANITIZER_TOOLCHAIN: ${{ inputs.sanitizer_toolchain }}
  RS_CI_FUZZ_MODE: ${{ inputs.cargo_fuzz_mode }}
  RS_CI_FUZZ_SECONDS_PER_TARGET: ${{ inputs.cargo_fuzz_seconds_per_target }}
  RS_CI_FUZZ_MAX_LEN: ${{ inputs.cargo_fuzz_max_len }}
  RS_CI_CARGO_MATRIX_CONFIG: ${{ inputs.cargo_feature_matrix_config }}

jobs:
  fast_checks:
    name: Fast checks
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Restore cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-lint-${{ env.RS_CI_FMT_TOOLCHAIN }}-${{ env.RS_CI_CLIPPY_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-${{ env.RS_CI_FMT_TOOLCHAIN }}-${{ env.RS_CI_CLIPPY_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-
            ${{ runner.os }}-cargo-lint-${{ env.RS_CI_FMT_TOOLCHAIN }}-${{ env.RS_CI_CLIPPY_TOOLCHAIN }}-

      - name: Install rustfmt and clippy
        run: |
          if [ -f .rs-ci/toolchains.sh ]; then
            TOOLCHAIN_CONTRACT=.rs-ci/toolchains.sh
          else
            TOOLCHAIN_CONTRACT=toolchains.sh
          fi
          bash "$TOOLCHAIN_CONTRACT"
          rustup toolchain install "$RS_CI_FMT_TOOLCHAIN" --profile minimal
          rustup component add rustfmt --toolchain "$RS_CI_FMT_TOOLCHAIN"
          rustup toolchain install "$RS_CI_CLIPPY_TOOLCHAIN" --profile minimal
          rustup component add clippy --toolchain "$RS_CI_CLIPPY_TOOLCHAIN"

      - name: Check code format
        run: |
          if [ -f .rs-ci/rustfmt.toml ]; then
            RUSTFMT_CONFIG=.rs-ci/rustfmt.toml
          else
            RUSTFMT_CONFIG=rustfmt.toml
          fi
          cargo +"$RS_CI_FMT_TOOLCHAIN" fmt -- --check --config-path "$RUSTFMT_CONFIG"
          if [ -f fuzz/Cargo.toml ]; then
            cargo +"$RS_CI_FMT_TOOLCHAIN" fmt \
              --manifest-path fuzz/Cargo.toml \
              -- --check --config-path "$RUSTFMT_CONFIG"
          fi

      - name: Run clippy
        run: cargo +"$RS_CI_CLIPPY_TOOLCHAIN" clippy --all-targets --all-features -- -D warnings

      - name: Run clippy for coverage cfg when enabled
        run: |
          if [ "$RUN_COVERAGE_CFG_CLIPPY" = "1" ]; then
            RUSTFLAGS="--cfg coverage" cargo +"$RS_CI_CLIPPY_TOOLCHAIN" clippy --all-targets --all-features -- -D warnings
          else
            echo "RUN_COVERAGE_CFG_CLIPPY is not enabled"
          fi

  miri:
    name: Conditional Miri checks
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    needs:
      - fast_checks

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Detect Miri configuration
        id: miri
        run: |
          set -euo pipefail
          if [ -x .rs-ci/cargo-miri-check.sh ]; then
            CHECKER=.rs-ci/cargo-miri-check.sh
          elif [ -x ./cargo-miri-check.sh ]; then
            CHECKER=./cargo-miri-check.sh
          else
            MIRI_OPTED_IN=$(
              cargo metadata --no-deps --format-version 1 |
                jq -r '
                  . as $metadata
                  | any(
                      $metadata.packages[];
                      (
                        .id as $id
                        | (
                            $metadata.workspace_members
                            | index($id)
                          ) != null
                      )
                      and (.metadata["rs-ci"].miri? == true)
                    )
                '
            )
            if [ "$MIRI_OPTED_IN" = "true" ]; then
              echo "Miri is configured, but cargo-miri-check.sh was not found" >&2
              echo "Update the .rs-ci submodule before enabling Miri." >&2
              exit 1
            fi
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          set +e
          RS_CI_PROJECT_ROOT="$PWD" "$CHECKER" --is-configured
          MIRI_CONFIG_STATUS=$?
          set -e
          if [ "$MIRI_CONFIG_STATUS" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          elif [ "$MIRI_CONFIG_STATUS" -eq 1 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            exit "$MIRI_CONFIG_STATUS"
          fi

      - name: Install Miri toolchain
        if: ${{ steps.miri.outputs.enabled == 'true' }}
        run: >-
          rustup toolchain install "$RS_CI_MIRI_TOOLCHAIN"
          --profile minimal
          --component miri

      - name: Prepare Miri sysroot
        if: ${{ steps.miri.outputs.enabled == 'true' }}
        run: cargo +"$RS_CI_MIRI_TOOLCHAIN" miri setup

      - name: Run configured Miri checks
        if: ${{ steps.miri.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          if [ -x .rs-ci/cargo-miri-check.sh ]; then
            CHECKER=.rs-ci/cargo-miri-check.sh
          else
            CHECKER=./cargo-miri-check.sh
          fi
          RS_CI_PROJECT_ROOT="$PWD" "$CHECKER"

      - name: Skip unconfigured Miri checks
        if: ${{ steps.miri.outputs.enabled != 'true' }}
        run: echo "Miri is not configured; skipping."

  sanitizers:
    name: Conditional sanitizer checks
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    needs:
      - fast_checks

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Detect sanitizer configuration
        id: sanitizer
        run: |
          set -euo pipefail
          if [ -x .rs-ci/cargo-sanitizer-check.sh ]; then
            CHECKER=.rs-ci/cargo-sanitizer-check.sh
          elif [ -x ./cargo-sanitizer-check.sh ]; then
            CHECKER=./cargo-sanitizer-check.sh
          else
            SANITIZER_OPTED_IN=$(
              cargo metadata --no-deps --format-version 1 |
                jq -r '
                  . as $metadata
                  | any(
                      $metadata.packages[];
                      (
                        .id as $id
                        | (
                            $metadata.workspace_members
                            | index($id)
                          ) != null
                      )
                      and (
                        (
                          .metadata["rs-ci"].sanitizers?
                          // []
                        )
                        | index("address") != null
                      )
                    )
                '
            )
            if [ "$SANITIZER_OPTED_IN" = "true" ]; then
              echo "AddressSanitizer is configured, but cargo-sanitizer-check.sh was not found" >&2
              echo "Update the .rs-ci submodule before enabling sanitizers." >&2
              exit 1
            fi
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          set +e
          RS_CI_PROJECT_ROOT="$PWD" "$CHECKER" --is-configured address
          SANITIZER_CONFIG_STATUS=$?
          set -e
          if [ "$SANITIZER_CONFIG_STATUS" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          elif [ "$SANITIZER_CONFIG_STATUS" -eq 1 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            exit "$SANITIZER_CONFIG_STATUS"
          fi

      - name: Install sanitizer toolchain
        if: ${{ steps.sanitizer.outputs.enabled == 'true' }}
        run: >-
          rustup toolchain install "$RS_CI_SANITIZER_TOOLCHAIN"
          --profile minimal
          --component rust-src

      - name: Run configured sanitizer checks
        if: ${{ steps.sanitizer.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          if [ -x .rs-ci/cargo-sanitizer-check.sh ]; then
            CHECKER=.rs-ci/cargo-sanitizer-check.sh
          else
            CHECKER=./cargo-sanitizer-check.sh
          fi
          RS_CI_PROJECT_ROOT="$PWD" "$CHECKER"

      - name: Skip unconfigured sanitizer checks
        if: ${{ steps.sanitizer.outputs.enabled != 'true' }}
        run: echo "Cargo sanitizers are not configured; skipping."

  fuzz_smoke:
    name: Conditional cargo-fuzz smoke check
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    needs:
      - fast_checks

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Detect cargo-fuzz package
        id: fuzz
        run: |
          set -euo pipefail
          if [ -x .rs-ci/cargo-fuzz-check.sh ]; then
            CHECKER=.rs-ci/cargo-fuzz-check.sh
          elif [ -x ./cargo-fuzz-check.sh ]; then
            CHECKER=./cargo-fuzz-check.sh
          else
            echo "cargo-fuzz-check.sh was not found" >&2
            exit 1
          fi
          if [ "$RS_CI_FUZZ_MODE" = "disabled" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if RS_CI_PROJECT_ROOT="$PWD" "$CHECKER" --is-configured; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore cargo-fuzz cache
        if: ${{ steps.fuzz.outputs.enabled == 'true' }}
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: ${{ runner.os }}-cargo-fuzz-${{ env.RS_CI_FUZZ_TOOLCHAIN }}-${{ env.CARGO_FUZZ_VERSION }}-${{ hashFiles('fuzz/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fuzz-${{ env.RS_CI_FUZZ_TOOLCHAIN }}-${{ env.CARGO_FUZZ_VERSION }}-

      - name: Install fuzz toolchain
        if: ${{ steps.fuzz.outputs.enabled == 'true' }}
        run: rustup toolchain install "$RS_CI_FUZZ_TOOLCHAIN" --profile minimal

      - name: Install cargo-fuzz
        if: ${{ steps.fuzz.outputs.enabled == 'true' }}
        run: |
          if ! command -v cargo-fuzz > /dev/null 2>&1; then
            cargo install --locked cargo-fuzz --version "$CARGO_FUZZ_VERSION"
          fi

      - name: Run conditional cargo-fuzz smoke checks
        run: |
          set -euo pipefail
          if [ -x .rs-ci/cargo-fuzz-check.sh ]; then
            CHECKER=.rs-ci/cargo-fuzz-check.sh
          else
            CHECKER=./cargo-fuzz-check.sh
          fi
          RS_CI_PROJECT_ROOT="$PWD" "$CHECKER"

      - name: Upload fuzz crash artifacts
        if: ${{ failure() && steps.fuzz.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts-${{ github.sha }}
          path: fuzz/artifacts
          if-no-files-found: ignore
          retention-days: 14

  loom:
    name: Conditional Loom model checks
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    needs:
      - fast_checks

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Detect Loom model tests
        id: loom
        run: |
          set -euo pipefail
          if [ -x .rs-ci/cargo-loom-check.sh ]; then
            CHECKER=.rs-ci/cargo-loom-check.sh
          elif [ -x ./cargo-loom-check.sh ]; then
            CHECKER=./cargo-loom-check.sh
          else
            echo "cargo-loom-check.sh was not found" >&2
            exit 1
          fi
          if RS_CI_PROJECT_ROOT="$PWD" "$CHECKER" --is-configured; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Loom test toolchain
        if: ${{ steps.loom.outputs.enabled == 'true' }}
        run: rustup toolchain install "$RS_CI_BUILD_TOOLCHAIN" --profile minimal

      - name: Run conditional Loom model checks
        if: ${{ steps.loom.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          if [ -x .rs-ci/cargo-loom-check.sh ]; then
            CHECKER=.rs-ci/cargo-loom-check.sh
          else
            CHECKER=./cargo-loom-check.sh
          fi
          RS_CI_PROJECT_ROOT="$PWD" "$CHECKER"

      - name: Skip unconfigured Loom model tests
        if: ${{ steps.loom.outputs.enabled != 'true' }}
        run: echo "loom is not configured; skipping."

  prepare_cargo_feature_matrix:
    name: Prepare Cargo feature matrix
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_matrix: ${{ steps.matrix.outputs.has_matrix }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install jq when feature matrix exists
        run: |
          if [ -f "$RS_CI_CARGO_MATRIX_CONFIG" ] && ! command -v jq > /dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Generate Cargo feature matrix
        id: matrix
        run: |
          set -euo pipefail
          if [ ! -f "$RS_CI_CARGO_MATRIX_CONFIG" ]; then
            matrix='{"include":[{"index":-1,"name":"no-configured-feature-matrix","enabled":false}]}'
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            echo "has_matrix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -x .rs-ci/cargo-feature-check.sh ]; then
            MATRIX_SCRIPT=.rs-ci/cargo-feature-check.sh
          elif [ -x ./cargo-feature-check.sh ]; then
            MATRIX_SCRIPT=./cargo-feature-check.sh
          else
            echo "Cargo feature matrix config exists, but cargo-feature-check.sh was not found" >&2
            exit 1
          fi
          matrix=$("$MATRIX_SCRIPT" github-matrix)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "has_matrix=true" >> "$GITHUB_OUTPUT"

  cargo_feature_matrix:
    name: Cargo feature matrix (${{ matrix.name }})
    if: ${{ github.event_name != 'schedule' && needs.prepare_cargo_feature_matrix.outputs.has_matrix == 'true' }}
    runs-on: ubuntu-latest
    needs:
      - fast_checks
      - prepare_cargo_feature_matrix

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare_cargo_feature_matrix.outputs.matrix) }}

    steps:
      - name: No configured Cargo feature matrix
        if: ${{ matrix.enabled == false }}
        run: echo "No .rs-ci-cargo-matrix.json found; using the default CI feature behavior."

      - name: Checkout source
        if: ${{ matrix.enabled == true }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Restore cargo cache
        if: ${{ matrix.enabled == true }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-feature-matrix-${{ env.RS_CI_BUILD_TOOLCHAIN }}-${{ env.RS_CI_CLIPPY_TOOLCHAIN }}-${{ matrix.name }}-${{ hashFiles('Cargo.toml') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-feature-matrix-${{ env.RS_CI_BUILD_TOOLCHAIN }}-${{ env.RS_CI_CLIPPY_TOOLCHAIN }}-${{ matrix.name }}-${{ hashFiles('Cargo.toml') }}-
            ${{ runner.os }}-cargo-feature-matrix-${{ env.RS_CI_BUILD_TOOLCHAIN }}-${{ env.RS_CI_CLIPPY_TOOLCHAIN }}-
            ${{ runner.os }}-cargo-build-${{ env.RS_CI_BUILD_TOOLCHAIN }}-

      - name: Install Rust toolchain
        if: ${{ matrix.enabled == true }}
        run: |
          rustup toolchain install "$RS_CI_BUILD_TOOLCHAIN" --profile minimal
          rustup toolchain install "$RS_CI_CLIPPY_TOOLCHAIN" --profile minimal
          rustup component add clippy --toolchain "$RS_CI_CLIPPY_TOOLCHAIN"

      - name: Install jq
        if: ${{ matrix.enabled == true }}
        run: |
          if ! command -v jq > /dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Run configured Cargo feature check
        if: ${{ matrix.enabled == true }}
        run: .rs-ci/cargo-feature-check.sh run-index "${{ matrix.index }}"

  build_test_coverage:
    name: Build, test, and coverage
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    needs:
      - fast_checks

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Restore cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-build-${{ env.RS_CI_BUILD_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ env.RS_CI_BUILD_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-
            ${{ runner.os }}-cargo-build-${{ env.RS_CI_BUILD_TOOLCHAIN }}-

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RS_CI_BUILD_TOOLCHAIN" --profile minimal
          rustup component add llvm-tools-preview --toolchain "$RS_CI_BUILD_TOOLCHAIN"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@${{ env.CARGO_LLVM_COV_VERSION }}

      - name: Install jq
        run: |
          if ! command -v jq > /dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Build project (debug)
        run: cargo +"$RS_CI_BUILD_TOOLCHAIN" build --verbose

      - name: Run doc tests
        run: cargo +"$RS_CI_BUILD_TOOLCHAIN" test --doc --verbose

      - name: Check README dependency versions
        run: |
          set -euo pipefail
          if [ -x .rs-ci/readme-version-check.py ]; then
            python3 .rs-ci/readme-version-check.py
          elif [ -x ./readme-version-check.py ]; then
            python3 ./readme-version-check.py
          else
            echo "readme-version-check.py was not found" >&2
            exit 1
          fi

      - name: Verify Cargo package
        run: |
          set -euo pipefail
          if [ -x .rs-ci/cargo-package-check.sh ]; then
            RS_CI_PROJECT_ROOT="$PWD" .rs-ci/cargo-package-check.sh
          elif [ -x ./cargo-package-check.sh ]; then
            RS_CI_PROJECT_ROOT="$PWD" ./cargo-package-check.sh
          else
            echo "cargo-package-check.sh was not found" >&2
            exit 1
          fi

      - name: Run tests and generate coverage reports
        run: |
          COVERAGE_OPEN_HTML=0 ./coverage.sh all
          cp target/llvm-cov/coverage.json coverage.json
          cp target/llvm-cov/lcov.info lcov.info
          cp target/llvm-cov/coverage.txt coverage.txt

      - name: Generate coverage summary and badge endpoint
        id: coverage
        run: |
          set -euo pipefail

          line_count=$(jq -r '[.data[].totals.lines.count // 0] | if length == 0 then 0 else add end' coverage.json)
          line_covered=$(jq -r '[.data[].totals.lines.covered // 0] | if length == 0 then 0 else add end' coverage.json)
          line_percent=$(jq -n \
            --argjson covered "$line_covered" \
            --argjson count "$line_count" \
            'if $count == 0 then 0 else ($covered * 100 / $count) end')
          line_percent_text=$(printf "%.2f%%" "$line_percent")
          line_percent_whole=$(printf "%.0f" "$line_percent")

          if [ "$line_count" = "0" ]; then
            line_percent_text="n/a"
            line_percent_whole=0
          fi

          if [ "$line_percent_whole" -ge 90 ]; then
            badge_color="#4c1"
          elif [ "$line_percent_whole" -ge 80 ]; then
            badge_color="#97ca00"
          elif [ "$line_percent_whole" -ge 70 ]; then
            badge_color="#dfb317"
          elif [ "$line_percent_whole" -ge 60 ]; then
            badge_color="#fe7d37"
          else
            badge_color="#e05d44"
          fi

          cat > coverage-badge.json <<JSON
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "$line_percent_text",
            "color": "${badge_color#\#}"
          }
          JSON

          {
            echo "## Code coverage"
            echo ""
            echo "| Metric | Covered | Total | Coverage |"
            echo "| --- | ---: | ---: | ---: |"
            jq -r '
              def pct($covered; $count):
                if $count == 0 then
                  "n/a"
                else
                  "\(((($covered * 10000 / $count) | round) / 100))%"
                end;
              reduce .data[] as $item (
                {fc: 0, fn: 0, lc: 0, ln: 0, rc: 0, rn: 0};
                .fc += ($item.totals.functions.covered // 0)
                | .fn += ($item.totals.functions.count // 0)
                | .lc += ($item.totals.lines.covered // 0)
                | .ln += ($item.totals.lines.count // 0)
                | .rc += ($item.totals.regions.covered // 0)
                | .rn += ($item.totals.regions.count // 0)
              )
              | [
                  "| Functions | \(.fc) | \(.fn) | \(pct(.fc; .fn)) |",
                  "| Lines | \(.lc) | \(.ln) | \(pct(.lc; .ln)) |",
                  "| Regions | \(.rc) | \(.rn) | \(pct(.rc; .rn)) |"
                ][]
            ' coverage.json
            echo ""
            echo "- HTML report: artifact \`coverage-reports\`, path \`target/llvm-cov/html/index.html\`."
            echo "- LCOV report: artifact \`coverage-reports\`, path \`lcov.info\`."
            echo "- Shields endpoint: artifact \`coverage-reports\`, path \`coverage-badge.json\`."
            echo ""
            echo "<details><summary>Text summary</summary>"
            echo ""
            echo '```text'
            cat coverage.txt
            echo '```'
            echo ""
            echo "</details>"
          } | tee coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

          echo "line_coverage=$line_percent_text" >> "$GITHUB_OUTPUT"

      - name: Comment coverage on pull request
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- rs-ci-coverage-report -->';
            const body = `${marker}\n${fs.readFileSync('coverage-summary.md', 'utf8')}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body && comment.body.includes(marker)
            );
            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Build project (release)
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) }}
        run: cargo +"$RS_CI_BUILD_TOOLCHAIN" build --release --verbose

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            lcov.info
            coverage.txt
            coverage.json
            coverage-badge.json
            coverage-summary.md
            target/llvm-cov/html
            target/llvm-cov/cobertura.xml
          retention-days: 14
          if-no-files-found: error

  build_pages:
    name: Build GitHub Pages
    if: ${{ always() && github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && needs.build_test_coverage.result == 'success' && (needs.cargo_feature_matrix.result == 'success' || needs.cargo_feature_matrix.result == 'skipped') }}
    runs-on: ubuntu-latest
    needs:
      - build_test_coverage
      - cargo_feature_matrix

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          name: coverage-reports
          path: .coverage-artifacts

      - name: Build Pages site
        run: |
          set -euo pipefail
          if [ -f .rs-ci/page/build-pages.mjs ]; then
            PAGE_BUILDER=.rs-ci/page/build-pages.mjs
          else
            PAGE_BUILDER=page/build-pages.mjs
          fi
          COVERAGE_JSON=.coverage-artifacts/coverage.json \
          COVERAGE_HTML_DIR=.coverage-artifacts/target/llvm-cov/html \
          RS_CI_PAGES_OUTPUT=public \
          node "$PAGE_BUILDER"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy_pages:
    name: Deploy GitHub Pages
    if: ${{ always() && github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && needs.build_pages.result == 'success' }}
    runs-on: ubuntu-latest
    needs:
      - build_pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  doc:
    name: Documentation
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    needs:
      - fast_checks

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Restore cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-build-${{ env.RS_CI_BUILD_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ env.RS_CI_BUILD_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-
            ${{ runner.os }}-cargo-build-${{ env.RS_CI_BUILD_TOOLCHAIN }}-

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RS_CI_BUILD_TOOLCHAIN" --profile minimal

      - name: Generate documentation
        run: RUSTDOCFLAGS="-D warnings -D missing-docs" cargo +"$RS_CI_BUILD_TOOLCHAIN" doc --all-features --no-deps --verbose

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v7
        with:
          name: rustdoc
          path: target/doc

  security_audit:
    name: Security audit
    if: ${{ always() && (github.event_name == 'schedule' || needs.fast_checks.result == 'success') && (github.event_name != 'schedule' || github.ref_name == 'main' || github.ref_name == 'master') }}
    runs-on: ubuntu-latest
    needs:
      - fast_checks

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Restore cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-build-${{ env.RS_CI_BUILD_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ env.RS_CI_BUILD_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-
            ${{ runner.os }}-cargo-build-${{ env.RS_CI_BUILD_TOOLCHAIN }}-

      - name: Restore cargo-binstall cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-binstall
          key: ${{ runner.os }}-cargo-binstall-v1.10.15
          restore-keys: |
            ${{ runner.os }}-cargo-binstall-

      - name: Restore cargo-audit cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-binaries-audit-latest
          restore-keys: |
            ${{ runner.os }}-cargo-binaries-audit-

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RS_CI_BUILD_TOOLCHAIN" --profile minimal

      - name: Install cargo-binstall
        run: |
          if ! command -v cargo-binstall > /dev/null 2>&1; then
            curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          fi

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit > /dev/null 2>&1; then
            cargo binstall cargo-audit --no-confirm --log-level info
          fi

      - name: Run security audit
        run: cargo +"$RS_CI_BUILD_TOOLCHAIN" audit

  windows_test:
    name: Windows test
    if: ${{ inputs.run_windows_tests && github.event_name != 'schedule' }}
    runs-on: windows-2022
    needs:
      - fast_checks

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Restore cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target
          key: ${{ runner.os }}-cargo-lint-${{ env.RS_CI_BUILD_TOOLCHAIN }}-${{ env.RS_CI_CLIPPY_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-${{ env.RS_CI_BUILD_TOOLCHAIN }}-${{ env.RS_CI_CLIPPY_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-
            ${{ runner.os }}-cargo-lint-${{ env.RS_CI_BUILD_TOOLCHAIN }}-${{ env.RS_CI_CLIPPY_TOOLCHAIN }}-

      - name: Install Rust
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $cargoBin = Join-Path $env:USERPROFILE ".cargo\bin"
          $env:Path = "$cargoBin;$env:Path"
          if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
            Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile "rustup-init.exe"
            .\rustup-init.exe -y --default-toolchain $env:RS_CI_BUILD_TOOLCHAIN --profile minimal
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          rustup toolchain install $env:RS_CI_BUILD_TOOLCHAIN --profile minimal
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          rustup toolchain install $env:RS_CI_CLIPPY_TOOLCHAIN --profile minimal
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          rustup component add clippy --toolchain $env:RS_CI_CLIPPY_TOOLCHAIN
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          rustup run $env:RS_CI_BUILD_TOOLCHAIN rustc --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          rustup run $env:RS_CI_BUILD_TOOLCHAIN cargo --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run clippy on Windows
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
          cargo "+$env:RS_CI_CLIPPY_TOOLCHAIN" clippy --all-targets --all-features -- -D warnings
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build and test on Windows
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
          cargo "+$env:RS_CI_BUILD_TOOLCHAIN" test --all-features --verbose
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  macos_test:
    name: macOS test
    if: ${{ inputs.run_macos_tests && github.event_name != 'schedule' }}
    runs-on: macos-15
    needs:
      - fast_checks

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Restore cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-lint-${{ env.RS_CI_BUILD_TOOLCHAIN }}-${{ env.RS_CI_CLIPPY_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-${{ env.RS_CI_BUILD_TOOLCHAIN }}-${{ env.RS_CI_CLIPPY_TOOLCHAIN }}-${{ hashFiles('Cargo.toml') }}-
            ${{ runner.os }}-cargo-lint-${{ env.RS_CI_BUILD_TOOLCHAIN }}-${{ env.RS_CI_CLIPPY_TOOLCHAIN }}-

      - name: Install Rust
        run: |
          rustup toolchain install "$RS_CI_BUILD_TOOLCHAIN" --profile minimal
          rustup toolchain install "$RS_CI_CLIPPY_TOOLCHAIN" --profile minimal
          rustup component add clippy --toolchain "$RS_CI_CLIPPY_TOOLCHAIN"

      - name: Run clippy on macOS
        run: cargo +"$RS_CI_CLIPPY_TOOLCHAIN" clippy --all-targets --all-features -- -D warnings

      - name: Build and test on macOS
        run: cargo +"$RS_CI_BUILD_TOOLCHAIN" test --all-features --verbose
