version: 2.1

orbs:
  win: circleci/windows@5.0

commands:
  checkout_https:
    steps:
      - run:
          name: Checkout source via HTTPS
          command: |
            git clone "https://github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git" .
            git checkout "$CIRCLE_SHA1"
            git submodule sync --recursive
            git submodule update --init --recursive --depth 1

  checkout_https_windows:
    steps:
      - run:
          name: Checkout source via HTTPS
          command: |
            $ErrorActionPreference = "Stop"
            $repo = "https://github.com/{0}/{1}.git" -f $env:CIRCLE_PROJECT_USERNAME, $env:CIRCLE_PROJECT_REPONAME
            git clone $repo .
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            git checkout $env:CIRCLE_SHA1
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            git submodule sync --recursive
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            git submodule update --init --recursive --depth 1
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  restore_cargo_cache:
    steps:
      - restore_cache:
          keys:
            - v5-cargo-cache-1.94.0-nightly-2026-06-05-{{ arch }}-{{ checksum "Cargo.toml" }}-{{ checksum "Cargo.lock" }}
            - v5-cargo-cache-1.94.0-nightly-2026-06-05-{{ arch }}-{{ checksum "Cargo.toml" }}-
            - v5-cargo-cache-1.94.0-nightly-2026-06-05-{{ arch }}-

  save_cargo_cache:
    steps:
      - save_cache:
          key: v5-cargo-cache-1.94.0-nightly-2026-06-05-{{ arch }}-{{ checksum "Cargo.toml" }}-{{ checksum "Cargo.lock" }}
          paths:
            - "~/.cargo/registry/index"
            - "~/.cargo/registry/cache"
            - "~/.cargo/git/db"
            - "target"

  restore_cargo_binstall_cache:
    steps:
      - restore_cache:
          keys:
            - v1-cargo-binstall-{{ arch }}-v1.10.15
            - v1-cargo-binstall-{{ arch }}-

  install_cargo_binstall:
    steps:
      - run:
          name: Install cargo-binstall
          command: |
            if ! command -v cargo-binstall > /dev/null 2>&1; then
              curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
            fi
      - save_cache:
          key: v1-cargo-binstall-{{ arch }}-v1.10.15
          paths:
            - "~/.cargo/bin/cargo-binstall"

jobs:
  fast_checks:
    docker:
      - image: rustlang/rust:nightly
    environment:
      RS_CI_FMT_TOOLCHAIN: nightly-2026-06-05
      RS_CI_CLIPPY_TOOLCHAIN: nightly-2026-06-05
    steps:
      - checkout_https
      - restore_cargo_cache
      - run:
          name: Install rustfmt and clippy
          command: |
            rustup toolchain install "$RS_CI_FMT_TOOLCHAIN" --profile minimal
            rustup component add rustfmt --toolchain "$RS_CI_FMT_TOOLCHAIN"
            rustup toolchain install "$RS_CI_CLIPPY_TOOLCHAIN" --profile minimal
            rustup component add clippy --toolchain "$RS_CI_CLIPPY_TOOLCHAIN"
      - run:
          name: Check code format
          command: |
            if [ -f .rs-ci/rustfmt.toml ]; then
              RUSTFMT_CONFIG=.rs-ci/rustfmt.toml
            else
              RUSTFMT_CONFIG=rustfmt.toml
            fi
            cargo +"$RS_CI_FMT_TOOLCHAIN" fmt -- --check --config-path "$RUSTFMT_CONFIG"
      - run:
          name: Run clippy
          command: cargo +"$RS_CI_CLIPPY_TOOLCHAIN" clippy --all-targets --all-features -- -D warnings
      - run:
          name: Run clippy for coverage cfg when enabled
          command: |
            if [ "${RUN_COVERAGE_CFG_CLIPPY:-0}" = "1" ]; then
              RUSTFLAGS="--cfg coverage" cargo +"$RS_CI_CLIPPY_TOOLCHAIN" clippy --all-targets --all-features -- -D warnings
            else
              echo "RUN_COVERAGE_CFG_CLIPPY is not enabled"
            fi
      - save_cargo_cache

  fuzz_smoke:
    docker:
      - image: rustlang/rust:nightly
    environment:
      CARGO_FUZZ_VERSION: "0.13.2"
      RS_CI_FUZZ_TOOLCHAIN: nightly-2026-06-05
      RS_CI_FUZZ_MODE: smoke
      RS_CI_FUZZ_SECONDS_PER_TARGET: "10"
    steps:
      - checkout_https
      - restore_cache:
          keys:
            - v1-cargo-fuzz-0.13.2-nightly-2026-06-05-{{ arch }}
      - run:
          name: Run conditional cargo-fuzz smoke checks
          command: |
            set -euo pipefail
            if [ -x .rs-ci/cargo-fuzz-check.sh ]; then
              CHECKER=.rs-ci/cargo-fuzz-check.sh
            elif [ -x ./cargo-fuzz-check.sh ]; then
              CHECKER=./cargo-fuzz-check.sh
            else
              echo "cargo-fuzz-check.sh was not found" >&2
              exit 1
            fi
            if [ "$RS_CI_FUZZ_MODE" = "disabled" ]; then
              echo "cargo-fuzz checks are disabled; skipping."
              exit 0
            fi
            if ! RS_CI_PROJECT_ROOT="$PWD" "$CHECKER" --is-configured; then
              echo "cargo-fuzz is not configured; skipping."
              exit 0
            fi
            rustup toolchain install "$RS_CI_FUZZ_TOOLCHAIN" --profile minimal
            if ! command -v cargo-fuzz > /dev/null 2>&1; then
              cargo install --locked cargo-fuzz --version "$CARGO_FUZZ_VERSION"
            fi
            RS_CI_PROJECT_ROOT="$PWD" "$CHECKER"
      - run:
          name: Prepare fuzz artifact directory
          when: on_fail
          command: |
            mkdir -p fuzz/artifacts
            touch fuzz/artifacts/.rs-ci-artifact-placeholder
      - save_cache:
          key: v1-cargo-fuzz-0.13.2-nightly-2026-06-05-{{ arch }}
          paths:
            - "~/.cargo/bin/cargo-fuzz"
      - store_artifacts:
          path: fuzz/artifacts
          destination: fuzz-artifacts
          when: on_fail

  build_test_coverage:
    docker:
      - image: rustlang/rust:nightly
    resource_class: medium+
    environment:
      RS_CI_BUILD_TOOLCHAIN: "1.94.0"
      RS_CI_CLIPPY_TOOLCHAIN: nightly-2026-06-05
    steps:
      - checkout_https
      - restore_cargo_cache
      - restore_cargo_binstall_cache
      - restore_cache:
          keys:
            - v1-cargo-binaries-llvm-cov-0.6.21-{{ arch }}
            - v1-cargo-binaries-llvm-cov-
      - install_cargo_binstall
      - run:
          name: Install cargo-llvm-cov and jq
          command: |
            rustup toolchain install "$RS_CI_BUILD_TOOLCHAIN" --profile minimal
            rustup toolchain install "$RS_CI_CLIPPY_TOOLCHAIN" --profile minimal
            rustup component add clippy --toolchain "$RS_CI_CLIPPY_TOOLCHAIN"
            if ! command -v cargo-llvm-cov > /dev/null 2>&1; then
              cargo binstall cargo-llvm-cov --version 0.6.21 --no-confirm --log-level info
            fi
            rustup component add llvm-tools-preview --toolchain "$RS_CI_BUILD_TOOLCHAIN"
            if ! command -v jq > /dev/null 2>&1; then
              apt-get update
              apt-get install -y jq
            fi
      - run:
          name: Build project (debug)
          command: cargo +"$RS_CI_BUILD_TOOLCHAIN" build --verbose
      - run:
          name: Run doc tests
          command: cargo +"$RS_CI_BUILD_TOOLCHAIN" test --doc --verbose
      - run:
          name: Run configured Cargo feature matrix
          command: |
            if [ -x .rs-ci/cargo-feature-check.sh ]; then
              MATRIX_SCRIPT=.rs-ci/cargo-feature-check.sh
            elif [ -x ./cargo-feature-check.sh ]; then
              MATRIX_SCRIPT=./cargo-feature-check.sh
            else
              config_file="${RS_CI_CARGO_MATRIX_CONFIG:-.rs-ci-cargo-matrix.json}"
              if [ -f "$config_file" ]; then
                echo "Cargo feature matrix config exists, but cargo-feature-check.sh was not found" >&2
                exit 1
              fi
              echo "No Cargo feature matrix config found; using the default CI feature behavior."
              exit 0
            fi
            "$MATRIX_SCRIPT" run-all
      - run:
          name: Run tests and generate coverage reports
          command: |
            COVERAGE_ENFORCE_THRESHOLDS=0 COVERAGE_OPEN_HTML=0 ./coverage.sh all
            cp target/llvm-cov/coverage.json coverage.json
            cp target/llvm-cov/lcov.info coverage.lcov
            cp target/llvm-cov/coverage.txt coverage.txt
      - run:
          name: Display coverage summary
          command: |
            echo "================================"
            echo "Code Coverage Summary"
            echo "================================"
            cat coverage.txt
      - run:
          name: Upload coverage to Coveralls
          command: |
            if [ -n "${COVERALLS_REPO_TOKEN:-}" ]; then
              if [ ! -s coverage.lcov ]; then
                echo "coverage.lcov is empty; skipping Coveralls upload"
                exit 0
              fi
              curl -sL https://coveralls.io/coveralls-linux.tar.gz | tar -xz
              ./coveralls report coverage.lcov --repo-token="$COVERALLS_REPO_TOKEN"
            else
              echo "COVERALLS_REPO_TOKEN is not set; skipping upload"
            fi
      - run:
          name: Build project (release)
          command: |
            if [ -n "${CIRCLE_PULL_REQUEST:-}" ]; then
              echo "Skipping release build for pull request"
              exit 0
            fi
            cargo +"$RS_CI_BUILD_TOOLCHAIN" build --release --verbose
      - save_cargo_cache
      - save_cache:
          key: v1-cargo-binaries-llvm-cov-0.6.21-{{ arch }}
          paths:
            - "~/.cargo/bin/cargo-llvm-cov"
            - "~/.cargo/bin/llvm-cov"
            - "~/.cargo/bin/llvm-profdata"
      - store_artifacts:
          path: coverage.lcov
      - store_artifacts:
          path: coverage.txt
      - store_artifacts:
          path: coverage.json
      - store_artifacts:
          path: target/llvm-cov
          destination: llvm-cov
      - persist_to_workspace:
          root: .
          paths:
            - target

  doc:
    docker:
      - image: rustlang/rust:nightly
    environment:
      RS_CI_BUILD_TOOLCHAIN: "1.94.0"
    steps:
      - checkout_https
      - restore_cargo_cache
      - attach_workspace:
          at: .
      - run:
          name: Install Rust toolchain
          command: rustup toolchain install "$RS_CI_BUILD_TOOLCHAIN" --profile minimal
      - run:
          name: Generate documentation
          command: RUSTDOCFLAGS="-D warnings" cargo +"$RS_CI_BUILD_TOOLCHAIN" doc --no-deps --verbose
      - store_artifacts:
          path: target/doc
          destination: doc

  security_audit:
    docker:
      - image: rustlang/rust:nightly
    environment:
      RS_CI_BUILD_TOOLCHAIN: "1.94.0"
    steps:
      - checkout_https
      - restore_cargo_cache
      - restore_cargo_binstall_cache
      - restore_cache:
          keys:
            - v1-cargo-binaries-audit-{{ arch }}-latest
            - v1-cargo-binaries-audit-{{ arch }}-
      - install_cargo_binstall
      - run:
          name: Install cargo-audit
          command: |
            rustup toolchain install "$RS_CI_BUILD_TOOLCHAIN" --profile minimal
            if ! command -v cargo-audit > /dev/null 2>&1; then
              cargo binstall cargo-audit --no-confirm --log-level info
            fi
      - save_cache:
          key: v1-cargo-binaries-audit-{{ arch }}-latest
          paths:
            - "~/.cargo/bin/cargo-audit"
      - run:
          name: Run security audit
          command: cargo +"$RS_CI_BUILD_TOOLCHAIN" audit

  windows_test:
    executor: win/server-2022
    environment:
      RS_CI_BUILD_TOOLCHAIN: "1.94.0"
    steps:
      - checkout_https_windows
      - restore_cache:
          keys:
            - v1-windows-cargo-cache-{{ arch }}-{{ checksum "Cargo.toml" }}-{{ checksum "Cargo.lock" }}
            - v1-windows-cargo-cache-{{ arch }}-{{ checksum "Cargo.toml" }}-
            - v1-windows-cargo-cache-{{ arch }}-
      - run:
          name: Install Rust
          command: |
            $ErrorActionPreference = "Stop"
            $cargoBin = Join-Path $env:USERPROFILE ".cargo\bin"
            $env:Path = "$cargoBin;$env:Path"
            if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
              Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile "rustup-init.exe"
              .\rustup-init.exe -y --default-toolchain $env:RS_CI_BUILD_TOOLCHAIN --profile minimal
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
            rustup toolchain install $env:RS_CI_BUILD_TOOLCHAIN --profile minimal
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            rustup component add clippy --toolchain $env:RS_CI_BUILD_TOOLCHAIN
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            rustup run $env:RS_CI_BUILD_TOOLCHAIN rustc --version
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            rustup run $env:RS_CI_BUILD_TOOLCHAIN cargo --version
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - run:
          name: Run clippy on Windows
          command: |
            $ErrorActionPreference = "Stop"
            $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
            cargo "+$env:RS_CI_BUILD_TOOLCHAIN" clippy --all-targets --all-features -- -D warnings
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - run:
          name: Build and test on Windows
          command: |
            $ErrorActionPreference = "Stop"
            $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
            cargo "+$env:RS_CI_BUILD_TOOLCHAIN" test --verbose
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - save_cache:
          key: v1-windows-cargo-cache-{{ arch }}-{{ checksum "Cargo.toml" }}-{{ checksum "Cargo.lock" }}
          paths:
            - "C:\\Users\\circleci\\.cargo\\registry"
            - "C:\\Users\\circleci\\.cargo\\git"
            - "target"

workflows:
  version: 2

  main_pipeline:
    jobs:
      - fast_checks
      - build_test_coverage:
          requires:
            - fast_checks
      - fuzz_smoke:
          requires:
            - fast_checks
      - windows_test:
          requires:
            - fast_checks
      - doc:
          requires:
            - fast_checks
      - security_audit:
          requires:
            - fast_checks

  nightly_security:
    triggers:
      - schedule:
          cron: "0 0 * * *"
          filters:
            branches:
              only:
                - main
                - master
    jobs:
      - security_audit
