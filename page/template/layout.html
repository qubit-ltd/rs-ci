<!doctype html>
<html lang="{{language.code}}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{page.title}}</title>
    <meta name="description" content="{{site.description}}">
    <link rel="stylesheet" href="{{assetPrefix}}assets/site.css">
  </head>
  <body>
    <header class="site-header">
      <nav class="site-nav" aria-label="Primary navigation">
        <a class="brand" href="{{basePrefix}}index.html">{{site.title}}</a>
        <div class="nav-links">
          {{{language.links}}}
          {{{coverage.navLink}}}
          <a href="{{site.githubUrl}}">Repository</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <h1>{{site.title}}</h1>
          <p>{{site.description}}</p>
        </div>
        <div class="hero-badges">
          {{{readme.badges}}}
        </div>
      </section>

      <article class="readme-content">
        {{{readme.html}}}
      </article>
    </main>

    <footer class="site-footer">
      <span>Generated by rs-ci.</span>
      <span>Last updated: {{ci.updatedAt}}</span>
    </footer>
  </body>
</html>
