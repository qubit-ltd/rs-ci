<!doctype html>
<html lang="{{language.code}}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{page.title}}</title>
    <meta name="description" content="{{site.description}}">
    <link rel="stylesheet" href="{{assetPrefix}}assets/site.css">
  </head>
  <body>
    <header class="site-header">
      <nav class="site-nav" aria-label="Primary navigation">
        <a class="brand" href="{{basePrefix}}index.html">{{site.title}}</a>
        <div class="nav-links">
          {{{language.links}}}
          {{{coverage.navLink}}}
          <a href="{{site.githubUrl}}">GitHub</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div>
          <h1>{{site.title}}</h1>
          <p>{{site.description}}</p>
        </div>
        <dl class="status-grid">
          <div>
            <dt>CI run</dt>
            <dd><a href="{{ci.runUrl}}">{{ci.runLabel}}</a></dd>
          </div>
          <div>
            <dt>Coverage</dt>
            <dd>{{coverage.linePercent}}</dd>
          </div>
          <div>
            <dt>Commit</dt>
            <dd><a href="{{ci.commitUrl}}">{{ci.shortSha}}</a></dd>
          </div>
        </dl>
      </section>

      {{{coverage.panel}}}

      <article class="readme-content">
        {{{readme.html}}}
      </article>
    </main>

    <footer class="site-footer">
      <span>Generated by rs-ci.</span>
      <span>Last updated: {{ci.updatedAt}}</span>
    </footer>
  </body>
</html>
